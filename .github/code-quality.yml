name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    # macOS 16 runner for Xcode 17 / Swift 6.2 toolchain.
    # If macos-16 is unavailable, fall back to macos-15 with xcode-version: latest-stable
    # and verify Swift 6.2 support. See CONTRIBUTING.md § CI Runners.
    runs-on: macos-16
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift version
        run: |
          swift --version
          SWIFT_VERSION=$(swift --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Detected Swift $SWIFT_VERSION"
          # Fail fast if Swift 6.2+ is not available
          if [[ "$(echo "$SWIFT_VERSION < 6.2" | bc)" -eq 1 ]]; then
            echo "::error::Swift 6.2+ required. Found $SWIFT_VERSION"
            exit 1
          fi

      - name: Install tools (latest)
        run: |
          # Always install latest — no version pinning.
          # Local dev uses the same approach (brew install swiftformat swiftlint).
          brew install swiftformat swiftlint shellcheck
          echo "SwiftFormat: $(swiftformat --version)"
          echo "SwiftLint: $(swiftlint version)"

      - name: Check formatting
        run: make format-check

      - name: Run linter
        run: make lint

      - name: Run pre-commit checks
        uses: j178/pre-commit-action@v1
        with:
          extra-args: --all-files --hook-stage manual
        env:
          # Skip hooks that are covered by explicit steps above or require
          # special setup. no-commit-to-branch is CI-irrelevant.
          SKIP: swiftformat,swiftlint,no-commit-to-branch
