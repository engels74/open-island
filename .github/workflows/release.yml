name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3, without v prefix)'
        required: true

permissions:
  contents: write

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Test — run full test suite before releasing
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift version
        run: |
          swift --version
          SWIFT_VERSION=$(swift --version 2>&1 | sed -n 's/.*Apple Swift version \([0-9]*\.[0-9]*\).*/\1/p')
          if [[ -z "$SWIFT_VERSION" ]]; then
            echo "::error::Could not detect Swift version from 'swift --version' output"
            exit 1
          fi
          echo "Detected Swift $SWIFT_VERSION"
          if [[ "$(echo "$SWIFT_VERSION < 6.2" | bc)" -eq 1 ]]; then
            echo "::error::Swift 6.2+ required. Found $SWIFT_VERSION"
            exit 1
          fi

      - name: Install just
        run: brew install just

      - name: Run tests
        run: just test-ci

  # ──────────────────────────────────────────────────────────────────────────
  # Build — create signed DMG and appcast
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Sign
    needs: test
    runs-on: macos-26

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.set-version.outputs.build_number }}
      dmg_size: ${{ steps.dmg-info.outputs.size }}
      ed_signature: ${{ steps.dmg-info.outputs.signature }}
      min_system: ${{ steps.dmg-info.outputs.min_system }}
      has_sparkle: ${{ steps.sparkle-key.outputs.has_key }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install just create-dmg || true

      - name: Resolve version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      # ── Version management ──────────────────────────────────────────────
      # Uses agvtool for reliable version updates. agvtool modifies
      # project.pbxproj directly and handles all build configurations
      # and targets — no fragile sed patterns.
      - name: Set version in Xcode project
        id: set-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="$(date +%Y%m%d%H%M)"

          # Set marketing version (CFBundleShortVersionString)
          agvtool new-marketing-version "$VERSION"

          # Set build number (CFBundleVersion)
          agvtool new-version -all "$BUILD_NUMBER"

          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Set version=$VERSION build=$BUILD_NUMBER"

          # Verify the update worked
          ACTUAL=$(agvtool what-marketing-version -terse1)
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "::error::agvtool verification failed. Expected $VERSION, got $ACTUAL"
            echo "Falling back to sed-based update..."
            sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" \
              OpenIsland.xcodeproj/project.pbxproj
            sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
              OpenIsland.xcodeproj/project.pbxproj
          fi

      - name: Commit version bump
        run: |
          if git diff --quiet OpenIsland.xcodeproj/project.pbxproj; then
            echo "Version already matches tag — no commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add OpenIsland.xcodeproj/project.pbxproj
          git commit --no-verify -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"

          # Push to main. Non-fatal — the DMG already has the correct version.
          git push origin HEAD:main || {
            echo "::warning::Could not push version commit to main (concurrent update?)."
            echo "The release will proceed — the DMG has the correct version."
          }

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build release
        run: just build-release

      # ── Sparkle signing ─────────────────────────────────────────────────
      - name: Setup Sparkle key
        id: sparkle-key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            mkdir -p .sparkle-keys
            echo "$SPARKLE_PRIVATE_KEY" > .sparkle-keys/eddsa_private_key
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::SPARKLE_PRIVATE_KEY not set — Sparkle signing skipped."
          fi

      - name: Create DMG and sign
        run: |
          SPARKLE_FLAG=""
          if [ "${{ steps.sparkle-key.outputs.has_key }}" != "true" ]; then
            SPARKLE_FLAG="--skip-sparkle"
          fi
          ./scripts/create-release.sh --skip-notarization --skip-github --skip-website $SPARKLE_FLAG

      # ── Artifact naming ─────────────────────────────────────────────────
      - name: Normalize DMG filename
        id: normalize-dmg
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.version }}"
          TARGET_DMG="releases/OpenIsland-${RELEASE_VERSION}.dmg"

          ACTUAL_DMG=$(ls -1 releases/OpenIsland-*.dmg 2>/dev/null | head -1)
          if [ -z "$ACTUAL_DMG" ]; then
            echo "::error::No DMG found in releases/"
            exit 1
          fi

          if [ "$ACTUAL_DMG" != "$TARGET_DMG" ]; then
            echo "Renaming $(basename "$ACTUAL_DMG") → $(basename "$TARGET_DMG")"
            mv "$ACTUAL_DMG" "$TARGET_DMG"
            APPCAST_DMG="releases/appcast/$(basename "$ACTUAL_DMG")"
            [ -f "$APPCAST_DMG" ] && mv "$APPCAST_DMG" "releases/appcast/$(basename "$TARGET_DMG")"
          fi

          echo "dmg_path=$TARGET_DMG" >> $GITHUB_OUTPUT

      - name: Extract DMG metadata
        id: dmg-info
        run: |
          DMG_PATH="${{ steps.normalize-dmg.outputs.dmg_path }}"
          SIZE=$(stat -f%z "$DMG_PATH")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          if [ -f "releases/appcast/appcast.xml" ]; then
            SIG=$(grep -oE 'sparkle:edSignature="[^"]+"' releases/appcast/appcast.xml 2>/dev/null \
              | head -1 | sed 's/sparkle:edSignature="//;s/"$//' || true)
            [ -n "$SIG" ] && echo "signature=$SIG" >> $GITHUB_OUTPUT
          fi

          MIN_SYS=$(/usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" \
            "build/export/Open Island.app/Contents/Info.plist" 2>/dev/null || echo "16.0")
          echo "min_system=$MIN_SYS" >> $GITHUB_OUTPUT

      - name: Build summary
        run: |
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ steps.set-version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- DMG Size: $(( ${{ steps.dmg-info.outputs.size }} / 1048576 )) MB" >> $GITHUB_STEP_SUMMARY
          echo "- Sparkle Signed: ${{ steps.dmg-info.outputs.signature != '' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Min macOS: ${{ steps.dmg-info.outputs.min_system }}" >> $GITHUB_STEP_SUMMARY

      # ── Upload & publish ────────────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-dmg
          path: releases/OpenIsland-${{ steps.version.outputs.version }}.dmg
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: releases/OpenIsland-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true

      - name: Upload appcast artifact
        if: steps.sparkle-key.outputs.has_key == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: appcast
          path: releases/appcast/appcast.xml

  # ──────────────────────────────────────────────────────────────────────────
  # VirusTotal — scan the DMG
  # ──────────────────────────────────────────────────────────────────────────
  virustotal-scan:
    name: VirusTotal Scan
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: release-dmg

      - name: Scan with VirusTotal
        uses: crazy-max/ghaction-virustotal@v5
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            *.dmg

      - name: Create scan results summary
        run: |
          {
            echo "### VirusTotal Scan Results"
            echo ""
            echo "**Scan completed:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "| File | Report |"
            echo "|------|--------|"
            IFS=',' read -ra PAIRS <<< "${{ steps.virustotal.outputs.analysis }}"
            for pair in "${PAIRS[@]}"; do
              filename="${pair%%=*}"
              url="${pair#*=}"
              echo "| \`${filename}\` | [View Report](${url}) |"
            done
          } | tee virustotal-results.md >> $GITHUB_STEP_SUMMARY

      - name: Append scan results to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="v${{ needs.build.outputs.version }}"
          gh release view "$VERSION" --json body --jq '.body' > current-body.md
          { cat current-body.md; echo ""; cat virustotal-results.md; } > updated-body.md
          gh release edit "$VERSION" --notes-file updated-body.md

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        with:
          name: virustotal-results
          path: virustotal-results.md
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # Website — update appcast for Sparkle auto-updates
  # ──────────────────────────────────────────────────────────────────────────
  update-website:
    name: Update Website Appcast
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.has_sparkle == 'true' && needs.build.outputs.ed_signature != ''

    steps:
      - name: Trigger website appcast update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WEBSITE_PAT }}
          repository: engels74/open-island-web
          event-type: update-appcast
          client-payload: |
            {
              "version": "${{ needs.build.outputs.version }}",
              "build_number": "${{ needs.build.outputs.build_number }}",
              "download_url": "https://github.com/engels74/open-island/releases/download/v${{ needs.build.outputs.version }}/OpenIsland-${{ needs.build.outputs.version }}.dmg",
              "ed_signature": "${{ needs.build.outputs.ed_signature }}",
              "file_size": "${{ needs.build.outputs.dmg_size }}",
              "min_system_version": "${{ needs.build.outputs.min_system }}"
            }
