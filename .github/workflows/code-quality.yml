name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift version
        run: |
          swift --version
          SWIFT_VERSION=$(swift --version 2>&1 | sed -n 's/.*Apple Swift version \([0-9]*\.[0-9]*\).*/\1/p')
          echo "Detected Swift $SWIFT_VERSION"
          if [[ "$(echo "$SWIFT_VERSION < 6.2" | bc)" -eq 1 ]]; then
            echo "::error::Swift 6.2+ required. Found $SWIFT_VERSION"
            exit 1
          fi

      - name: Install tools (latest)
        run: |
          brew update
          brew install just swiftformat swiftlint shellcheck
          echo "just: $(just --version)"
          echo "SwiftFormat: $(swiftformat --version)"
          echo "SwiftLint: $(swiftlint version)"

      - name: Check formatting
        run: just format-check

      - name: Run linter
        run: just lint

      - name: Run prek checks
        uses: j178/prek-action@v1
        with:
          extra-args: --all-files --hook-stage manual
        env:
          # Skip hooks covered by explicit steps above or CI-irrelevant.
          SKIP: swiftformat,swiftlint,no-commit-to-branch
